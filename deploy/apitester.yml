services:

  apitester:
    image: pwarnon/apitester:latest
    container_name: apitester
    ports:
      - "4200:80"
    volumes:
      # Monter votre proxy.config.json pour configurer les routes proxy (contournement CORS).
      # Format : { "/prefix": { "target": "http://host:port", "secure": false } }
      # Télécharger l'exemple : https://github.com/pwarnon/apitester/blob/master/proxy.config.json
      - ./proxy.config.json:/etc/nginx/proxy.config.json:ro
    restart: unless-stopped

  echo-server:
    image: pwarnon/apitester-echo:latest
    container_name: apitester-echo
    ports:
      - "8888:8888"
    restart: unless-stopped

# ─── Utilisation ────────────────────────────────────────────────────────────
#
#  1. Copier ce fichier sur n'importe quel Mac / PC avec Docker installé.
#
#  2. Créer un fichier proxy.config.json dans le même répertoire :
#       {
#         "/proxy": { "target": "http://mon-api:8080", "secure": false }
#       }
#     (optionnel — sans ce fichier, l'app démarre sans proxy)
#
#  3. Démarrer :
#       docker compose -f apitester.yml up -d
#
#  4. Ouvrir http://localhost:4200
#
#  5. Arrêter :
#       docker compose -f apitester.yml down
#
#  6. Mettre à jour vers la dernière version :
#       docker compose -f apitester.yml pull
#       docker compose -f apitester.yml up -d
